name: Licensing check

on: workflow_call

permissions:
  contents: read

jobs:
  licensing:
    name: Check open source licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Ignored packages
      # @tanstack/*
      #   MIT: https://github.com/TanStack/router/blob/main/LICENSE

      - run: |
          cd packages/app-builder

          bunx license-report \
            --exclude @tanstack/react-start \
            --exclude @tanstack/react-router-ssr-query \
            --exclude @tanstack/react-router \
            | bunx license-report-check \
              --allowed MIT \
              --allowed ISC \
              --allowed Apache-2.0 \
              --allowed BSD-0-Clause \
              --allowed BSD-2-Clause \
              --allowed BSD-3-Clause \
              --allowed Unlicense \
              --allowed FSL-1.1-MIT
