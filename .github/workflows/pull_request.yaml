name: Pull request CI

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compliance:
    permissions:
      contents: read
    uses: ./.github/workflows/compliance.yaml

  check:
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/check.yaml
